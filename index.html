<!DOCTYPE html><html lang="ar" dir="rtl"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1"><title>محوّل الإحداثيات الجغرافية</title>
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet">
<style>*{box-sizing:border-box;margin:0;padding:0}:root{--bg:#0a0a0a;--bg2:#121212;--gold:#d4af37;--gold2:#b8860b;--gold3:#f0d78c;--text:#f5f5f5;--text2:#c9c9c9;--border:#2a2a2a;--panel:#1a1a1a}body{font-family:cairo,sans-serif;min-height:100vh;background:linear-gradient(135deg,#0a0a0a 0%,#121212 50%,#0a0a0a 100%);color:var(--text);overflow-x:hidden}h1{font-size:clamp(1.5rem,3vw,2.5rem);font-weight:900;color:var(--gold);letter-spacing:.08em;text-align:center;margin-bottom:8px}h2{font-size:1.2rem;font-weight:700;color:var(--gold2);text-align:center;margin-bottom:4px}h3{font-size:.8rem;font-weight:600;color:var(--gold3);text-align:center;letter-spacing:.3em;text-transform:uppercase;margin-bottom:20px}hr{border:none;height:1px;background:linear-gradient(90deg,transparent,var(--gold3),transparent);margin:8px 0 24px;border-radius:1px}.c{max-width:1400px;margin:0 auto;padding:32px 24px 48px}.bx{background:var(--panel);border:1px solid var(--border);border-radius:16px;padding:28px 26px;margin-bottom:28px;position:relative;overflow:hidden}.bx::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,transparent,var(--gold),transparent)}.hd{display:flex;flex-wrap:wrap;align-items:center;justify-content:space-between;gap:16px;margin-bottom:20px}.hd h2{margin:0;color:var(--gold);font-size:1.1rem}.hd small{color:var(--text2);font-size:.8rem}.blk{display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:20px;margin-bottom:16px}.gf{display:flex;flex-wrap:wrap;gap:16px;align-items:flex-end}.lbl{font-size:.75rem;font-weight:700;color:var(--gold2);margin-bottom:10px;display:block;text-transform:uppercase;letter-spacing:.1em}.grp{position:relative}.grp INPUT{width:100%;padding:12px 16px;font-size:1.1rem;background:#1a1a1a;border:1px solid #333;border-radius:10px;color:var(--text);font-family:inherit;outline:none;transition:border-color .2s,box-shadow .2s}.grp INPUT:focus{border-color:var(--gold);box-shadow:0 0 12px rgba(212,175,55,.2)}.grp SELECT{width:100%;padding:12px 16px;font-size:1.1rem;background:#1a1a1a;border:1px solid #333;border-radius:10px;color:var(--text);font-family:inherit;cursor:pointer;outline:none;transition:border-color .2s,box-shadow .2s}.grp SELECT:focus{border-color:var(--gold);box-shadow:0 0 12px rgba(212,175,55,.2)}.btn{padding:14px 28px;font-size:1rem;font-weight:700;font-family:inherit;border:none;border-radius:10px;cursor:pointer;transition:all .3s;display:inline-flex;align-items:center;gap:8px}.btn-g{background:linear-gradient(135deg,var(--gold) 0%,var(--gold2) 100%);color:#0a0a0a;box-shadow:0 4px 20px rgba(212,175,55,.3)}.btn-g:hover{transform:translateY(-2px);box-shadow:0 6px 30px rgba(212,175,55,.4)}.btn-p{background:#1a1a1a;border:1px solid var(--gold);color:var(--gold)}.btn-p:hover{background:rgba(212,175,55,.08)}.btn-s{padding:8px 18px;font-size:.8rem;font-weight:700;color:#0a0a0a;background:linear-gradient(135deg,var(--gold) 0%,var(--gold2) 100%);border:none;border-radius:8px;cursor:pointer;transition:all .2s;white-space:nowrap}.btn-s:hover{transform:translateY(-1px);box-shadow:0 3px 12px rgba(212,175,55,.3)}.btn-s:active{transform:translateY(0)}.crd{background:#1a1a1a;border:1px solid #252525;border-radius:12px;padding:18px 20px;transition:border-color .2s,box-shadow .2s}.crd:hover{border-color:rgba(212,175,55,.3);box-shadow:0 2px 20px rgba(212,175,55,.08)}.crd-hd{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}.crd-t{font-size:.7rem;font-weight:700;color:var(--gold3);letter-spacing:.2em;text-transform:uppercase}.crd-v{font-family:monospace;font-size:1rem;color:var(--text2);background:#121212;border-radius:8px;padding:12px 14px;word-break:break-all;line-height:1.6;margin-bottom:12px}.exs{display:flex;flex-wrap:wrap;gap:10px}.ex-btn{background:#1a1a1a;border:1px solid #333;color:var(--text2);padding:10px 18px;border-radius:8px;cursor:pointer;font-size:.85rem;font-weight:600;transition:all .2s}.ex-btn:hover{border-color:var(--gold);color:var(--gold)}.ex-btn.active{background:rgba(212,175,55,.08);border-color:var(--gold);color:var(--gold)}.hist{display:flex;flex-wrap:wrap;gap:8px}.hs{background:#1a1a1a;border:1px solid #333;color:var(--text2);padding:8px 14px;border-radius:8px;cursor:pointer;font-size:.8rem;font-family:monospace;transition:all .2s;max-width:180px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}.hs:hover{border-color:var(--gold);color:var(--gold)}.map-w{height:300px;border-radius:12px;overflow:hidden;border:1px solid #252525;background:#121212}.ts{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:linear-gradient(135deg,var(--gold) 0%,var(--gold2) 100%);color:#0a0a0a;padding:12px 28px;border-radius:50px;font-weight:700;z-index:9999;opacity:0;pointer-events:none;transition:opacity .3s,transform .3s}.ts.show{opacity:1;transform:translateX(-50%) translateY(0)}.@media(max-width:768px){.c{padding:16px 16px 32px}.blk{grid-template-columns:1fr}.hd{flex-direction:column;align-items:flex-start}.crd-v{font-size:.9rem}}</style></head><body><div class="ts" id="ts"></div><div class="hd" style="text-align:center;padding:40px 0"><h1>M R - B A R G</h1><h2>محوّل الإحداثيات الجغرافية</h2><h3>Coordinate Converter</h3><hr></div>
<div class="c">
<div class="bx"><div class="hd"><h2>أمثلة سريعة</h2><button class="btn-g" id="gps" onclick="gps()">موقعي الحالي</button></div> <div class="exs" id="exs"><div class="ex-btn active" onclick="ex('ry')">الرياض</div><div class="ex-btn" onclick="ex('mk')">مكة المكرمة</div><div class="ex-btn" onclick="ex('jd')">جدة</div><div class="ex-btn" onclick="ex('md')">المدينة المنورة</div><div class="ex-btn" onclick="ex('dm')">الدمام</div></div></div><div class="bx"><div class="hd"><h2>إدخال الإحداثيات</h2><button class="btn-p" onclick="conv()">تحويل</button></div><div class="blk"><div><label class="lbl">خط العرض (Latitude)</label><div class="gf"><div class="grp" style="flex:2"><input id="lat" inputmode="decimal" placeholder="24.7136" oninput="sync()"></div><div class="grp" style="flex:1"><select id="latD"><option value="N">شمال N</option><option value="S">جنوب S</option></select></div></div></div><div><label class="lbl">خط الطول (Longitude)</label><div class="gf"><div class="grp" style="flex:2"><input id="lng" inputmode="decimal" placeholder="46.6753" oninput="sync()"></div><div class="grp" style="flex:1"><select id="lngD"><option value="E">شرق E</option><option value="W">غرب W</option></select></div></div></div></div></div><div class="bx" id="res" style="display:none"><div class="hd"><h2>النتائج</h2><div><button class="btn-p" onclick="sh()">مشاركة</button><button class="btn-p" onclick="cpAll()">نسخ الكل</button></div></div><div class="blk" id="out"></div></div>
<div class="bx" id="mapbx" style="display:none"><div class="hd"><h2>معاينة الخريطة</h2></div><div id="mv"></div></div>
<div class="bx" id="hbx"><div class="hd"><h2>سجل المحولات</h2><button class="btn-p" onclick="clr()">مسح السجل</button></div><div class="hist" id="hist"></div></div>
<div style="text-align:center;padding:28px 0;font-size:.75rem;color:var(--text2)">تم الإنشاء بواسطة <span style="color:var(--gold)">Mr-Barg</span> © 2026</div></div><script>
const exData={ry:[24.7136,46.6753],mk:[21.4225,39.8262],jd:[21.4858,39.1925],md:[24.5247,39.5692],dm:[26.4207,50.0888]};
function ex(k){document.querySelectorAll('.ex-btn').forEach(b=>b.classList.remove('active'));event.target.classList.add('active');var e=exData[k];gV(e[0],e[1]);}
function gV(la,lo){document.getElementById('lat').value=la;document.getElementById('lng').value=lo;sync();}
function sync(){var l=document.getElementById('lat').value;var g=document.getElementById('lng').value;if(!l&&!g)return;if(l){var s=parseFloat(l);if(l<0){l=Math.abs(l);document.getElementById('latD').value='S';}else{document.getElementById('latD').value='N';}}if(g){var s=parseFloat(g);if(g<0){g=Math.abs(g);document.getElementById('lngD').value='W';}else{document.getElementById('lngD').value='E';}}}
gps(){navigator.geolocation.getCurrentPosition(function(p){gV(p.coords.latitude.toFixed(6),p.coords.longitude.toFixed(6));},function(e){alert('تعذر الحصول على الموقع. تأكد من تفعيل GPS.');},{enableHighAccuracy:true});}
conv(){var lt=document.getElementById('lat').value;var lg=document.getElementById('lng').value;if(!lt||!lg){alert('الرجاء إدخال الإحداثيات');return;}var lat=parseFloat(lt);var lng=parseFloat(lg);var latD=document.getElementById('latD').value;var lngD=document.getElementById('lngD').value;if(latD==='S')lat=-lat;if(lngD==='W')lng=-lng;showMap(lat,lng);addHist(lat,lng);out(lat,lng);document.getElementById('res').style.display='block';document.getElementById('mapbx').style.display='block';saveHist(lat,lng);}toDMS(v){var d=Math.floor(Math.abs(v));var m=(Math.abs(v)-d)*60;var mi=Math.floor(m);var s=((m-mi)*60).toFixed(1);return d+String.fromCharCode(176)+String('  ')+mi+String.fromCharCode(39)+String(' ')+s+String.fromCharCode(34);}toDDM(v){var d=Math.floor(Math.abs(v));var m=((Math.abs(v)-d)*60).toFixed(4);return d+String.fromCharCode(176)+String(' ')+m+String.fromCharCode(39);}toUTM(lat,lng){var zone=Math.floor((lng+180)/6)+1;var latBand='CDEFGHJKLMNPQRSTUVWX';var bi=Math.floor((lat+80)/8);var band=latBand.charAt(bi);var a=6378137;var e=0.08181919;var e2=e*e;var k0=0.9996;var dlng=lng-(zone*6-183);var slat=Math.sin(lat*Math.PI/180);var N=a/Math.sqrt(1-e2*slat*slat);var T=Math.tan(lat*Math.PI/180)*Math.tan(lat*Math.PI/180);var C=e2/(1-e2)*Math.cos(lat*Math.PI/180)*Math.cos(lat*Math.PI/180);var A=(lng-(zone*6-183))*Math.PI/180*Math.cos(lat*Math.PI/180);var M=a*((1-e2/4-3*e2*e2/64-5*e2*e2*e2/256)*lat*Math.PI/180-(3*e2/8+3*e2*e2/32+45*e2*e2*e2/1024)*Math.sin(2*lat*Math.PI/180)+(15*e2*e2/256+45*e2*e2*e2/1024)*Math.sin(4*lat*Math.PI/180)-(35*e2*e2*e2/3072)*Math.sin(6*lat*Math.PI/180));var E=500000+k0*N*(A*A*(1-T+C)/6+A*A*A*A*(5-18*T+T*T+72*C-58*e2/(1-e2))/120);var Nv=lat>=0?M+k0*N*Math.tan(lat*Math.PI/180)*(A*A/2+A*A*A*A*(5-T+9*C+4*C*C)/24):M+k0*N*Math.tan(lat*Math.PI/180)*(A*A/2+A*A*A*A*(5-T+9*C+4*C*C)/24)-10000000;return zone+band+' '+(E/100).toFixed(0)+' '+(Nv/100).toFixed(0);}toMGRS(lat,lng){var zone=Math.floor((lng+180)/6)+1;var s="NOPQRSTUVWX";var bi=s.indexOf(s.slice(Math.floor((lat-48)/8))+s)||Math.floor((lat-48)/8);var col='ABCDEFGHJKLMNPQRSTUVWXYZ';var cIdx=Math.floor(((lng+180)%6)/200000*8)%8;var rIdx=Math.floor(((lat)%200000)/100000);cIdx=cIdx>=0?cIdx:0;rIdx=rIdx>=0?rIdx:0;return zone+s.charAt(bi)+col.charAt(cIdx)+col.charAt((cIdx+rIdx)%8)+' '+(50+y).toFixed(0)+' '+(50+x).toFixed(0);}toGH(lat,lng){var s='';var b=String.fromCharCode;var mid=0;var max=90,min=-90;var isLat=true;for(var i=0;i<12;i++){var q=isLat?(lat+Math.abs(min))/((max-min)/2):(lng+Math.abs(min))/((max-min)/2);s+=(q>=1?'8':'0');if(isLat){if(q>=1)min=(min+max)/2;else max=(min+max)/2;}else{if(q>=1)min=(min+max)/2;else max=(min+max)/2;}isLat=!isLat;}return s.substring(0,8);}out(lat,lng){var o=document.getElementById('out');var deg=lat.toFixed(7)+', '+lng.toFixed(7);if(lat<0)deg=Math.abs(lat).toFixed(7)+'S, '+Math.abs(lng).toFixed(7);else{if(lng<0)deg=lat.toFixed(7)+'N, '+Math.abs(lng).toFixed(7)+'W';}var dmsL=toDMS(lat);var dmsG=toDMS(lng);var ddml=toDDM(lat);var ddmg=toDDM(lng);var dms=dmsL+', '+dmsG;var ddm=ddml+', '+ddmg;var latS=lat<0?'S':'N';var lngS=lng<0?'W':'E';var u=toUTM(lat,lng);var g=toGH(lat,lng);var gm='https://www.google.com/maps?q='+lat.toFixed(6)+','+lng.toFixed(6);var osm='https://www.openstreetmap.org/?mlat='+lat.toFixed(6)+'&mlon='+lng.toFixed(6)+'#map=12/'+lat.toFixed(6)+'/'+lng.toFixed(6);var dg=latS+Math.abs(lat).toFixed(5)+', '+lngS+Math.abs(lng).toFixed(5);var car='{ "type": "Point", "coordinates": ['+lng.toFixed(6)+', '+lat.toFixed(6)+'] }';var geo2=lng.toFixed(7)+', '+lat.toFixed(7);var ah='geo:'+lat.toFixed(6)+','+lng.toFixed(6);o.innerHTML='';var items=[{t:'درجات عشرية',v:deg},{t:'درجات دقائق ثواني (DMS)',v:dms},{t:'درجات ودقائق (DDM)',v:ddm},{t:'UTM (WGS84)',v:u},{t:'MGRS',v:'غير متاح'},{t:'Geohash',v:g},{t:'Google Maps',v:gm},{t:'OpenStreetMap',v:osm},{t:'DD عكسي (GeoJSON)',v:car},{t:'Apple Maps',v:ah}];for(var i=0;i<items.length;i++){var cp='cp(this)' if(i<6){cp='cp(this,'+JSON.stringify(items[i].v).replace(/"/g,'\x27')+')';}else{cp='cp(this,'+JSON.stringify(items[i].v)+')';}var h=document.createElement('div');h.className='crd';h.innerHTML='<div class=\"crd-hd\"><span class=\"crd-t\">'+items[i].t+'</span><button class=\"btn-s\" onclick="'+cp+'">نسخ</button></div><div class=\"crd-v\">'+items[i].v+'</div>';o.appendChild(h);}}
function cp(b,v){if(v===undefined)v=b.parentElement.nextElementSibling.textContent;navigator.clipboard.writeText(v);showToast();}showMap(lat,lng){var m=document.getElementById('mv');m.innerHTML='<iframe width=\"100%\" height=\"300\" style=\"border:0\" src=\"https://www.openstreetmap.org/export/embed.html?bbox='+(lng-0.1)+','+(lat-0.1)+','+(lng+0.1)+','+(lat+0.1)+'&layer=mapnik&#38;marker='+lat.toFixed(6)+','+lng.toFixed(6)+'\"></iframe>';}addHist(lat,lng){var h=document.getElementById('hist');var d=document.createElement('div');d.className='hs';d.textContent=lat.toFixed(4)+','+lng.toFixed(4);d.onclick=function(){gV(lat.toFixed(6),lng.toFixed(6));};h.appendChild(d);if(h.children.length>5)h.removeChild(h.firstChild);}cpAll(){var o=document.getElementById('out');var t='';o.querySelectorAll('.crd-v').forEach(function(c){t+=c.textContent+'\n\n';});navigator.clipboard.writeText(t);showToast();}sh(){var lat=document.getElementById('lat').value;var lng=document.getElementById('lng').value;var text=lat.toFixed(6)+','+lng.toFixed(6);if(navigator.share){navigator.share({title:'إحداثيات',text:text,url:'geo:'+lat+','+lng});}else{cp(document.getElementById('res'),text);}}saveHist(lat,lng){try{var h=JSON.parse(localStorage.getItem('chist')||'[]');var e=lat.toFixed(6)+','+lng.toFixed(6);var ni=[e];for(var i=0;i<h.length;i++){if(h[i]!==e)ni.push(h[i]);}if(ni.length>5)ni.length=5;localStorage.setItem('chist',JSON.stringify(ni));}catch(e){}}loadHist(){var hs=document.getElementById('hist');var h=JSON.parse(localStorage.getItem('chist')||'[]');for(var i=0;i<h.length;i++){var parts=h[i].split(',');var d=document.createElement('div');d.className='hs';d.textContent=h[i];d.onclick=function(){var p=this.textContent.split(',');gV(p[0],p[1]);};hs.appendChild(d);}}showToast(){var t=document.getElementById('ts');t.textContent='تم النسخ';t.classList.add('show');setTimeout(function(){t.classList.remove('show')},1800);}clr(){var hs=document.getElementById('hist');hs.innerHTML='';localStorage.removeItem('chist');}document.addEventListener('DOMContentLoaded',function(){loadHist();});</script></body></html>
